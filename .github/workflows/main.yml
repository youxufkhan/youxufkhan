name: GitHub Profile Metrics

on:
  schedule:
    - cron: "0 0 * * *"     # Daily
  workflow_dispatch:
  push:
    branches: ["master", "main"]

jobs:
  github-profile:
    runs-on: ubuntu-latest
    environment:
      name: production
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # -----------------------
      # Generate GitHub Metrics
      # -----------------------
      - name: Generate Metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: youxufkhan
          template: classic
          base: header, activity, community, repositories, metadata
          config_output: svg
          config_display: columns
          config_octicon: yes
          config_timezone: Asia/Karachi

          # plugin_habits: yes
          # plugin_habits_charts_type: classic
          # plugin_habits_days: 14
          # plugin_habits_facts: yes
          # plugin_habits_from: 200
          # plugin_habits_languages_limit: 8
          # plugin_habits_languages_threshold: 0%

          plugin_languages: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_analysis_timeout_repositories: 7.5
          plugin_languages_categories: markup, programming
          plugin_languages_colors: github
          plugin_languages_ignored: html,css
          plugin_languages_limit: 8
          plugin_languages_recent_categories: markup, programming
          plugin_languages_recent_days: 14
          plugin_languages_recent_load: 300
          plugin_languages_sections: most-used
          plugin_languages_threshold: 0%

          plugin_lines: yes
          plugin_lines_history_limit: 1
          plugin_lines_repositories_limit: 4
          plugin_lines_sections: base
          plugin_isocalendar: yes
          plugin_achievements: yes
          plugin_achievements_limit: 6

      # -----------------------
      # Generate Trophy
      # -----------------------
      - name: Generate Trophy
        uses: Erik-Donath/github-profile-trophy@feature/generate-svg
        with:
          username: youxufkhan
          file: profile/trophy.svg
          token: ${{ secrets.METRICS_TOKEN }}
          theme: onedark

      # -----------------------
      # Generate README Stats
      # -----------------------
      - name: Generate Stats Card
        run: |
          mkdir -p profile
          curl -o profile/stats.svg "https://github-readme-stats.vercel.app/api?username=youxufkhan&show_icons=true&theme=tokyonight&hide_border=true&cache_seconds=86400"

      - name: Generate Streak Card
        run: |
          curl -o profile/streak.svg "https://github-readme-streak-stats.herokuapp.com/?user=youxufkhan&theme=tokyonight&hide_border=true"

      - name: Generate Top Languages
        run: |
          curl -o profile/langs.svg "https://github-readme-stats.vercel.app/api/top-langs/?username=youxufkhan&layout=compact&theme=tokyonight&hide_border=true&cache_seconds=86400"

      # -----------------------
      # Commit Updates
      # -----------------------
      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add .
          git commit -m "Update GitHub profile metrics" || exit 0
          git pull --rebase
          git push